services:
  neo4j:
    image: neo4j:5.26
    container_name: janus-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-janustest123}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Optional: containerized MCP Fabric server, mainly for production/cloud
  # deployment. For local development, run `python -m core.mcp_fabric.server`
  # on the host instead - the "Documents > Ingest folder" feature in the
  # frontend passes host filesystem paths, which a containerized server
  # cannot read. Enable with `docker compose --profile docker up -d`.
  mcp-fabric:
    profiles: ["docker"]
    build: .
    container_name: janus-mcp-fabric
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-janustest123}
      YANDEX_CLOUD_FOLDER: ${YANDEX_CLOUD_FOLDER}
      YANDEX_CLOUD_API_KEY: ${YANDEX_CLOUD_API_KEY}
      YANDEX_CLOUD_MODEL: ${YANDEX_CLOUD_MODEL:-deepseek-v4-flash/latest}
    volumes:
      - ./fixtures:/app/fixtures:ro

volumes:
  neo4j_data:
